<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>改善版サンプル</title>
<style>
body{font-family:sans-serif;background:#fdf8f3;padding:20px}

/* 修正ポイント */
.cause-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

@media (max-width:900px){
  .cause-grid{
    grid-template-columns:repeat(2,1fr);
  }
}

@media (max-width:640px){
  .cause-grid{
    grid-template-columns:1fr;
  }
}

.cause-card{
  background:#fff;
  border-radius:20px;
  padding:20px;
  text-align:left;
}

.cause-card-title{
  font-size:22px;
  font-weight:900;
  text-align:center;
  margin-bottom:10px;
}

.cause-card-text{
  font-size:16px;
  line-height:1.8;
}
</style>
</head>
<body>

<h2>原因となる疾患・事故</h2>

<div class="cause-grid">
  <div class="cause-card">
    <div class="cause-card-title">脳血管疾患</div>
    <div class="cause-card-text">脳梗塞・脳出血など</div>
  </div>
  <div class="cause-card">
    <div class="cause-card-title">外傷性脳損傷</div>
    <div class="cause-card-text">交通事故・転倒など</div>
  </div>
  <div class="cause-card">
    <div class="cause-card-title">その他</div>
    <div class="cause-card-text">脳炎・低酸素など</div>
  </div>
</div>

</body>
</html>
