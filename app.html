<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>にゃんログ</title>
<link rel="icon" href="favicon.png">

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }
.container { max-width:480px; margin:auto; background:#fff; min-height:100vh; }
.header { background:#2d6a4f; color:#fff; padding:16px; text-align:center; font-weight:bold; }
.section { padding:16px; border-bottom:1px solid #eee; }
.btn { display:inline-block; padding:12px; margin:6px 0; width:100%; border:none; border-radius:10px; background:#eee; font-size:16px; }
.btn.active { background:#2d6a4f; color:#fff; }
.save { background:#ff6b6b; color:#fff; font-weight:bold; }
</style>
</head>

<body>

<div class="container">

  <div class="header">
    🐱 にゃんログ
  </div>

  <div class="section">
    <h3>今日の気分</h3>
    <button class="btn" onclick="setMood('元気')">元気</button>
    <button class="btn" onclick="setMood('普通')">普通</button>
    <button class="btn" onclick="setMood('しんどい')">しんどい</button>
  </div>

  <div class="section">
    <h3>お薬</h3>
    <button class="btn" onclick="setMed(true)">飲んだ</button>
    <button class="btn" onclick="setMed(false)">飲んでない</button>
  </div>

  <div class="section">
    <h3>メモ</h3>
    <textarea id="memo" style="width:100%;height:80px;"></textarea>
  </div>

  <div class="section">
    <button class="btn save" onclick="save()">保存</button>
  </div>

  <div class="section">
    <a href="./index.html">← サービス紹介へ戻る</a>
  </div>

</div>

<script>
let mood = "";
let med = null;

function setMood(m){
  mood = m;
  alert("気分：" + m);
}

function setMed(m){
  med = m;
  alert("薬：" + (m ? "飲んだ" : "飲んでない"));
}

function save(){
  const memo = document.getElementById("memo").value;
  const data = {
    date: new Date().toLocaleDateString(),
    mood,
    med,
    memo
  };
  localStorage.setItem("nyanlog", JSON.stringify(data));
  alert("保存しました！");
}
</script>

</body>
</html>
